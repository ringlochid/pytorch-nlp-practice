seed: 42
experiment_name: tune_lstm_small_slow_ag_news_cpu

system:
  device: cpu
  output_root: runs

data:
  train_subset: 20000
  val_ratio: 0.1
  test_subset: 2000
  max_length: 64
  batch_size: 32
  num_workers: 0
  max_vocab_size: 20000
  min_freq: 2
  lowercase: true

model:
  name: lstm
  emb_dim: 96
  hidden_dim: 96
  num_layers: 1
  dropout: 0.3
  bidirectional: false

train:
  epochs: 5
  lr: 0.002
  weight_decay: 0.03
  grad_clip: 1.0
