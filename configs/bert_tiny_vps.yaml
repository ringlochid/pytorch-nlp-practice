seed: 42
experiment_name: bert_tiny_ag_news_cpu

system:
  device: cpu
  output_root: runs

data:
  train_subset: 12000
  val_ratio: 0.1
  test_subset: 2000
  max_length: 96
  batch_size: 8
  num_workers: 0
  ag_news_cache_dir: .cache/ag_news

model:
  name: bert
  pretrained_model_name_or_path: prajjwal1/bert-tiny
  local_files_only: false

train:
  epochs: 2
  lr: 0.00002
  weight_decay: 0.01
  grad_clip: 1.0
