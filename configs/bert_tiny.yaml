seed: 42
experiment_name: bert_tiny_ag_news_cpu

system:
  device: cpu
  output_root: runs

data:
  train_subset: 10000
  val_ratio: 0.1
  test_subset: 2000
  max_length: 128
  batch_size: 8
  num_workers: 0

model:
  model_name: prajjwal1/bert-tiny

train:
  epochs: 3
  lr: 0.00002
  weight_decay: 0.01
  grad_clip: 1.0
