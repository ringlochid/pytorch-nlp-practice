seed: 42
experiment_name: smoke_transformer_ag_news_cpu

system:
  device: cpu
  output_root: runs

data:
  train_subset: 512
  val_ratio: 0.1
  test_subset: 128
  max_length: 32
  batch_size: 8
  num_workers: 0
  max_vocab_size: 100000
  min_freq: 1
  lowercase: true

model:
  name: transformer
  emb_dim: 128
  num_layers: 8
  ffn_dim: 512
  num_heads: 4
  dropout: 0.1
  max_len: 512

train:
  epochs: 5
  lr: 0.003
  weight_decay: 0.0
  grad_clip: 1.0
