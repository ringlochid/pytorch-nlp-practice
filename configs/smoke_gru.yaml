seed: 42
experiment_name: smoke_gru_ag_news_cpu

system:
  device: cpu
  output_root: runs

data:
  train_subset: 512
  val_ratio: 0.1
  test_subset: 128
  max_length: 32
  batch_size: 8
  num_workers: 0
  max_vocab_size: 5000
  min_freq: 1
  lowercase: true

model:
  name: gru
  emb_dim: 32
  hidden_dim: 32
  num_layers: 1
  dropout: 0.1
  bidirectional: false

train:
  epochs: 1
  lr: 0.003
  weight_decay: 0.0
  grad_clip: 1.0
